services:
  backend:
    build: ./backend
    container_name: var_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/var_portfolio.db"
      CORS_ORIGINS: '["http://localhost", "http://localhost:80"]'
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: var_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
